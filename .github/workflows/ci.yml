name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: test + clippy (default + arena)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Test (default features — zero-dep, unsafe-free)
        run: cargo test -p rostdown --release

      - name: Test (arena + profiling features)
        # `arena` is the crate's ONLY unsafe module (a scoped bump
        # allocator); this runs its ScopedAlloc routing tests + the
        # Drop-ing Arena twin + the pure bump_compute suite. `profiling`
        # compiles profile_phases.
        run: cargo test -p rostdown --release --features arena,profiling

      - name: Clippy (both configurations, warnings = errors)
        run: |
          cargo clippy -p rostdown --all-targets -- -D warnings
          cargo clippy -p rostdown --all-targets --features arena,profiling -- -D warnings

  miri:
    name: Miri — arena UB (Stacked + Tree Borrows)
    runs-on: ubuntu-latest
    # RUSTUP_TOOLCHAIN overrides the repo's stable rust-toolchain.toml pin
    # (which ships no miri) so `cargo miri` resolves to this nightly.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src

      - name: Miri setup
        run: cargo miri setup

      - name: Miri (Stacked Borrows)
        # Verifies bump_compute + the Drop-ing Arena twin (pointer
        # provenance via base.add). The ScopedAlloc routing tests are
        # #[cfg_attr(miri, ignore)] — Miri does not execute a
        # #[global_allocator].
        run: cargo miri test -p rostdown --lib --features arena,profiling

      - name: Miri (Tree Borrows)
        env:
          RUSTUP_TOOLCHAIN: nightly
          MIRIFLAGS: "-Zmiri-tree-borrows"
        run: cargo miri test -p rostdown --lib --features arena,profiling

  asan:
    name: ASan — live arena path (golden corpus)
    # Miri can't execute a #[global_allocator], so the LIVE ScopedAlloc
    # path (bump → scope reset → result copy-out) is covered here instead:
    # the golden test installs ScopedAlloc as its global allocator under
    # `--features arena`, so this run exercises the real bump path over
    # the whole corpus under AddressSanitizer. detect_leaks is off because
    # the per-thread arena region is leaked by design (POD, no Drop).
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: nightly
      RUSTFLAGS: "-Zsanitizer=address"
      ASAN_OPTIONS: "detect_leaks=0"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: ASan — golden corpus through the live arena
        run: >
          cargo test -Zbuild-std
          --target x86_64-unknown-linux-gnu
          -p rostdown --features arena --test golden
